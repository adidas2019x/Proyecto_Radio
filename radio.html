<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radios de La Paz - API</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-between p-6">

    <div class="text-center max-w-md w-full">
        <h1 class="text-3xl font-bold mb-2">📻 Radios de La Paz</h1>
        <p class="text-slate-400 mb-6 text-sm">Cargando estaciones en vivo desde la API...</p>

        <!-- Contenedor corregido (sin espacios en el id) -->
        <div id="estaciones-container" class="flex flex-col gap-3 max-h-[50vh] overflow-y-auto pr-1">
            <p class="text-slate-500 text-sm">Buscando emisoras...</p>
        </div>
    </div>

    <!-- Reproductor de audio fijo abajo -->
    <div class="mt-6 bg-slate-800 p-4 rounded-2xl shadow-xl border border-slate-700 w-full max-w-md text-center">
        <p id="now-playing" class="text-slate-300 font-medium mb-2 text-sm">Selecciona una estación</p>
        <audio id="audio-player" controls class="w-full"></audio>
    </div>

    <script>
        async function cargarRadiosLaPaz() {
            const container = document.getElementById('estaciones-container');
            
            try {
                // Consultamos directamente el endpoint de la API para estaciones de Bolivia
                const respuesta = await fetch('https://de1.api.radio-browser.info/json/stations/bycountrycodeexact/BO');
                const radios = await respuesta.json();
                
                // Filtro flexible para capturar variaciones como "La Paz", "LP", etc.
                const radiosLaPaz = radios.filter(r => {
                    const estado = r.state ? r.state.toLowerCase() : '';
                    const nombre = r.name ? r.name.toLowerCase() : '';
                    return estado.includes('paz') || nombre.includes('paz');
                });

                container.innerHTML = '';

                if (radiosLaPaz.length === 0) {
                    container.innerHTML = '<p class="text-red-400 text-sm">No se encontraron estaciones en este momento.</p>';
                    return;
                }

                radiosLaPaz.forEach(radio => {
                    const urlStream = radio.url_resolved || radio.url;
                    const nombreRadio = radio.name || 'Emisora sin nombre';

                    const boton = document.createElement('button');
                    boton.className = "bg-slate-800 hover:bg-slate-700 border border-slate-700 p-4 rounded-xl text-md font-semibold shadow transition flex items-center justify-between px-5 text-left w-full";
                    
                    boton.innerHTML = `
                        <span class="truncate pr-2">${nombreRadio}</span>
                        <span class="text-xs bg-blue-600 px-2.5 py-1 rounded-full text-white shrink-0">Reproducir</span>
                    `;

                    boton.onclick = () => reproducirRadio(urlStream, nombreRadio);
                    container.appendChild(boton);
                });

            } catch (error) {
                console.error("Error al conectar con la API:", error);
                container.innerHTML = '<p class="text-red-400 text-sm">Error al cargar las estaciones desde la red.</p>';
            }
        }

        function reproducirRadio(url, nombre) {
            const player = document.getElementById('audio-player');
            const label = document.getElementById('now-playing');
            
            label.textContent = "Reproduciendo: " + nombre;
            player.src = url;
            player.play().catch(e => {
                label.textContent = "Reproductor listo para: " + nombre;
            });
        }

        cargarRadiosLaPaz();
    </script>

</body>
</html>
