<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Viewport adaptado para móviles, previene zoom y se ajusta a safe-areas -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radios de La Paz</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-dark text-light min-h-screen flex flex-col justify-between overflow-x-hidden">

    <!-- Círculos decorativos de fondo con desenfoque (Glow effects) -->
    <div class="glow-bg">
        <div class="glow-circle glow-1"></div>
        <div class="glow-circle glow-2"></div>
    </div>

    <!-- VISTA 1: LISTA Y BÚSQUEDA -->
    <div id="list-view" class="w-full flex-grow flex flex-col z-10">
        <main class="flex-grow w-full max-w-lg mx-auto px-5 pt-8 pb-32 flex flex-col gap-6">
            
            <!-- Cabecera -->
            <header class="text-center">
                <div class="logo-badge inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-semibold mb-3">
                    <span class="pulse-dot"></span> EN VIVO
                </div>
                <h1 class="text-3xl font-bold tracking-tight font-outfit text-gradient mb-1">Radios de La Paz</h1>
                <p class="text-secondary text-xs">Emisoras en vivo de Bolivia • Filtro de región</p>
            </header>

            <!-- Barra de Búsqueda Mejorada -->
            <div class="search-box">
                <div class="search-wrapper">
                    <!-- Icono de Búsqueda -->
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="Buscar emisora o ciudad..." autocomplete="off" aria-label="Buscar emisoras">
                    <!-- Botón de Limpiar Búsqueda -->
                    <button id="clear-search" class="clear-btn hidden" aria-label="Limpiar búsqueda">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>

            <!-- Sección de Favoritos (Oculta si está vacía) -->
            <section id="favorites-section" class="hidden flex flex-col gap-3">
                <h2 class="section-title text-sm font-semibold tracking-wide text-secondary font-outfit flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="text-star"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    MIS FAVORITAS
                </h2>
                <div id="favorites-container" class="flex flex-col gap-2.5">
                    <!-- Se llena con JS -->
                </div>
            </section>

            <!-- Sección de Todas las Estaciones -->
            <section class="flex flex-col gap-3">
                <h2 class="section-title text-sm font-semibold tracking-wide text-secondary font-outfit flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
                    TODAS LAS EMISORAS
                </h2>
                
                <!-- Indicador de Carga / Mensajes -->
                <div id="status-message" class="card p-6 text-center text-secondary text-sm">
                    <div class="spinner mx-auto mb-3"></div>
                    Buscando emisoras en vivo...
                </div>

                <!-- Contenedor de Estaciones -->
                <div id="estaciones-container" class="flex flex-col gap-2.5">
                    <!-- Se llena con JS -->
                </div>
            </section>

        </main>

        <!-- Mini Reproductor Flotante Fijo Abajo (Glassmorphic) -->
        <footer id="mini-player" class="player-panel fixed bottom-0 left-0 right-0 z-20 px-5 pb-safe-bottom pt-3 border-t border-glass-border bg-glass hidden">
            <div class="max-w-lg mx-auto flex items-center justify-between">
                
                <!-- Info de la radio (Click abre reproductor completo) -->
                <div id="mini-player-info" class="flex items-center gap-3 overflow-hidden pr-4 flex-grow cursor-pointer py-1">
                    <div class="player-avatar mini flex items-center justify-center shrink-0">
                        <svg class="text-primary mini-music-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                        
                        <!-- Animación de mini onda -->
                        <div id="mini-wave-visualizer" class="wave-container mini hidden">
                            <span class="bar bar1"></span>
                            <span class="bar bar2"></span>
                            <span class="bar bar3"></span>
                        </div>
                    </div>
                    <div class="overflow-hidden">
                        <h4 id="mini-playing-title" class="font-semibold text-xs truncate text-light leading-snug">Ninguna estación</h4>
                        <p id="mini-playing-subtitle" class="text-[10px] text-secondary truncate">Reproduciendo en vivo</p>
                    </div>
                </div>

                <!-- Botones del Mini Player -->
                <div class="flex items-center gap-3 shrink-0">
                    <!-- Botón Play/Pause Mini -->
                    <button id="mini-play-btn" class="mini-player-play-btn" aria-label="Reproducir/Pausar">
                        <svg id="mini-play-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        <svg id="mini-pause-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                        <div id="mini-player-buffering" class="spinner-small hidden"></div>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <!-- VISTA 2: REPRODUCTOR PANTALLA COMPLETA (Overlay deslizante) -->
    <div id="full-player" class="full-player-view fixed inset-0 z-30 flex flex-col justify-between translate-y-full transition-transform duration-300 ease-out pb-safe-bottom">
        
        <!-- Fondo con desenfoque adicional -->
        <div class="glow-bg">
            <div class="glow-circle glow-1" style="opacity: 0.3;"></div>
            <div class="glow-circle glow-2" style="opacity: 0.3;"></div>
        </div>

        <!-- Cabecera del Reproductor -->
        <header class="w-full max-w-lg mx-auto px-6 pt-10 flex items-center justify-between z-10">
            <!-- Botón REGRESAR -->
            <button id="back-to-list-btn" class="back-btn flex items-center gap-1.5 text-secondary hover:text-light transition py-2 px-3 rounded-xl bg-glass border border-glass-border font-outfit text-xs font-semibold" aria-label="Regresar a la lista">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                REGRESAR
            </button>
            <span class="text-xs font-bold tracking-widest text-primary-light font-outfit">REPRODUCIENDO</span>
            <div class="w-12"></div> <!-- Spacer para balancear -->
        </header>

        <!-- Contenido Central (Detalles y Avatar Grande) -->
        <main class="w-full max-w-lg mx-auto px-6 flex flex-col items-center justify-center gap-8 z-10 flex-grow">
            
            <!-- Avatar / Disco Grande Giratorio -->
            <div class="large-avatar-container">
                <div id="large-avatar" class="large-avatar flex items-center justify-center">
                    <span id="large-avatar-letter" class="font-outfit text-6xl font-extrabold text-primary-light">R</span>
                </div>
                <!-- Efecto de ondas expansivas en el fondo al sonar -->
                <div id="pulse-ring-1" class="pulse-ring hidden"></div>
                <div id="pulse-ring-2" class="pulse-ring hidden"></div>
            </div>

            <!-- Título y Subtítulo de la Emisora -->
            <div class="text-center w-full px-4">
                <h2 id="full-playing-title" class="text-2xl font-bold font-outfit tracking-tight text-light leading-snug mb-1 truncate">Nombre de la Emisora</h2>
                <p id="full-playing-subtitle" class="text-sm text-secondary font-medium tracking-wide flex items-center justify-center gap-1.5">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary-light"><path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 12 8 12s8-6.75 8-12a8 8 0 0 0-8-8z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    <span id="full-playing-state">La Paz, Bolivia</span>
                </p>
            </div>

            <!-- Visualizador de Ondas de Audio Grande -->
            <div class="large-wave-visualizer flex items-end justify-center gap-1.5 h-16 w-full">
                <span class="large-bar large-bar-1"></span>
                <span class="large-bar large-bar-2"></span>
                <span class="large-bar large-bar-3"></span>
                <span class="large-bar large-bar-4"></span>
                <span class="large-bar large-bar-5"></span>
                <span class="large-bar large-bar-6"></span>
                <span class="large-bar large-bar-7"></span>
                <span class="large-bar large-bar-8"></span>
            </div>
        </main>

        <!-- Controles Inferiores (Play, Next, Prev, Volumen) -->
        <footer class="w-full max-w-lg mx-auto px-6 pb-12 pt-4 flex flex-col gap-6 z-10">
            
            <!-- Botones Principales de Control de Reproducción -->
            <div class="flex items-center justify-center gap-8">
                <!-- Botón ANTERIOR EMISORA -->
                <button id="prev-station-btn" class="control-btn prev-btn" aria-label="Emisora anterior">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon><rect x="5" y="4" width="2" height="16"></rect></svg>
                </button>

                <!-- Botón PLAY/PAUSE GRANDE -->
                <button id="full-play-btn" class="large-play-btn" aria-label="Reproducir/Pausar">
                    <svg id="full-play-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    <svg id="full-pause-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                    <div id="full-player-buffering" class="spinner hidden" style="width: 28px; height: 28px;"></div>
                </button>

                <!-- Botón SIGUIENTE EMISORA -->
                <button id="next-station-btn" class="control-btn next-btn" aria-label="Siguiente emisora">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"></polygon><rect x="17" y="4" width="2" height="16"></rect></svg>
                </button>
            </div>

            <!-- Control de Volumen Grande -->
            <div class="flex items-center gap-4 bg-glass border border-glass-border rounded-2xl px-5 py-3.5 mt-2">
                <button id="full-volume-mute-btn" class="volume-btn text-secondary" aria-label="Mutear volumen">
                    <svg id="full-vol-high-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    <svg id="full-vol-mute-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
                </button>
                <input type="range" id="full-volume-slider" class="volume-slider flex-grow" min="0" max="1" step="0.05" value="0.8" aria-label="Volumen">
                <span id="full-volume-percent" class="text-xs text-secondary w-8 text-right">80%</span>
            </div>

        </footer>
    </div>

    <!-- Audio Element oculto nativo -->
    <audio id="native-audio" preload="none"></audio>

    <script src="js/app.js"></script>
</body>
</html>
